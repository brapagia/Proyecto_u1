<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registro · Hotel Quinta Dalam</title>
</head>
<body>
    <header>
        <!-- Barra superior con enlaces secundarios -->
        <div class="barra_sup">
            <div class="barra_supdere">
                <a href="Iniciosesion.html">Inicia sesión</a> | <a href="Registro.html">Resgistrate</a> 
            </div>
        </div>

        <!-- Barra de navegación principal -->
        <nav class="navbar">
            <ul>
                <li><a href="Reservaciones.html">Reservaciones</a></li>
                <li><a href="Catalogo.html">Habitaciones</a></li>                
                <li class="brand"><a href="index.html">Quinta Dalam</a></li>  
                <li><a href="Conocenos.html">Conocenos</a></li>              
                <li><a href="Contacto.html">Contactanos</a></li>
            </ul>
        </nav>
    </header>

    <main>
            <div class="form-container">
                <h2>Registro de usuario</h2>
                <form action="#" method="post" class="form-registro">
                    <div class="campo">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="campo">
                        <label for="apellidos">Apellidos:</label>
                        <input type="text" id="apellidos" name="apellidos" required>
                    </div>
                    <div class="campo">
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="campo">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="campo">
                        <label for="confirm-password">Confirmar contraseña:</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>
                    </div>
                    <button type="submit" class="btn-submit">Registrarse</button>
                </form>
                <p class="enlace-form">¿Ya tienes cuenta? <a href="Iniciosesion.html">Inicia sesión</a></p>
            </div>
        </main>

    <footer>
        <p>&copy; 2026 Hotel Quinta Dalam. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
