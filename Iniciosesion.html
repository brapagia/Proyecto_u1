<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Inicio de sesión · Hotel Quinta Dalam</title>
</head>
<body>
    <header>
        <!-- Barra superior con enlaces secundarios -->
        <div class="barra_sup">
            <div class="barra_supdere">
                <a href="Iniciosesion.html">Inicia sesión</a> | <a href="Registro.html">Resgistrate</a> 
            </div>
        </div>

        <!-- Barra de navegación principal -->
        <nav class="navbar">
            <ul>
                <li><a href="Reservaciones.html">Reservaciones</a></li>
                <li><a href="Catalogo.html">Habitaciones</a></li>                
                <li class="brand"><a href="index.html">Quinta Dalam</a></li>  
                <li><a href="Conocenos.html">Conocenos</a></li>              
                <li><a href="Contacto.html">Contactanos</a></li>
            </ul>
        </nav>
    </header>

  <main>
        <div class="form-container">
            <h2>Iniciar sesión</h2>
            <form action="#" method="post" class="form-login">
                <div class="campo">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="campo">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
            <p class="enlace-form">¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Hotel Quinta Dalam. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
